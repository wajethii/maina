    <script>
        document.getElementById("copyrightYear").innerHTML = new Date().getFullYear();

    <script>
        // Define the list of pages
        const pages = [
            { title: 'Work', url: 'work.html' },
            { title: 'About', url: 'about.html' },
            { title: 'Gallery', url: 'gallery.html' },
            { title: 'Contact', url: 'contact.html' }
        ];

        // Function to generate navigation and mobile menu links
        function generateLinks(containerId, linksClassName) {
            const container = document.getElementById(containerId);
            const fragment = document.createDocumentFragment();
            pages.forEach(page => {
                const link = document.createElement('a');
                link.href = page.url;
                link.textContent = page.title;
                link.className = linksClassName;
                fragment.appendChild(link);
            });
            container.appendChild(fragment);
        }

        // Function to generate DM link
        function generateDMLink() {
            const dmLinkContainer = document.getElementById('dm-link-container');
            const dmLink = document.createElement('a');
            dmLink.href = 'index.html';
            dmLink.textContent = 'DM';
            dmLink.className = 'text-black text-lg font-semibold hover:text-gray-500 px-4';
            const span = document.createElement('span');
            span.appendChild(dmLink);
            dmLinkContainer.appendChild(span);
        }

        // Call the functions to generate links
        generateLinks('navigation', 'text-lg text-black hover:text-gray-500 font-semibold px-4');
        generateLinks('mobile-menu-content', 'block text-white hover:text-gray-500 px-4 py-2');
        generateDMLink();
    </script>

    <script>
        // JavaScript to toggle mobile menu
        document.getElementById('menu-toggle').addEventListener('click', function () {
            document.getElementById('mobile-menu').classList.toggle('hidden');
        });
    </script>
